name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release APK
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Подпись включается, только если в секретах репозитория задан keystore.
      # Без секретов собирается неподписанный release APK.
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          apk=$(ls app/build/outputs/apk/release/*.apk | head -n1)
          cp "$apk" "${{ runner.temp }}/masha-pogoda.apk"

      # Берём раздел нужной версии из CHANGELOG.md (заголовок вида "## [1.0.3]").
      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes="$RUNNER_TEMP/release-notes.md"
          awk -v hdr="## [$version]" '
            index($0, hdr)==1 { capture=1; next }
            capture && index($0, "## [")==1 { exit }
            capture { print }
          ' CHANGELOG.md > "$notes"
          # Если раздел не найден/пуст — оставляем файл пустым и включаем автогенерацию.
          if [ -s "$notes" ]; then
            echo "NOTES_FOUND=true" >> "$GITHUB_ENV"
          else
            echo "NOTES_FOUND=false" >> "$GITHUB_ENV"
          fi
          echo "NOTES_PATH=$notes" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/masha-pogoda.apk
          body_path: ${{ env.NOTES_FOUND == 'true' && env.NOTES_PATH || '' }}
          generate_release_notes: ${{ env.NOTES_FOUND != 'true' }}
          fail_on_unmatched_files: true
